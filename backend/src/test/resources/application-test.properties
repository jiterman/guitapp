spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Mail test configuration
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Cloudinary mock configuration for tests
cloudinary.cloud_name=mock-cloud-name
cloudinary.api_key=mock-api-key
cloudinary.api_secret=mock-api-secret

# Gemini mock configuration for tests
gemini.api.key=mock-api-key
gemini.api.url=http://mock-api-url

# Groq Transcription mock configuration for tests
groq.api.key=mock-groq-key
groq.api.url=http://mock-groq-url

# Internal API key for tests
internal.api.key=test-internal-key
